services:
  toxic-trap-escape-room:
    build: .
    container_name: toxic-trap-escape-room
    ports:
      - "5173:5173"
    # Geliştirme sırasında canlı kod güncellemesi için proje klasörünü mount et
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "5173"]
